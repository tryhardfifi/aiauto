name: AIAgent
options:
  bundleIdPrefix: com.aiauto
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  AIAgent:
    type: application
    platform: iOS
    sources:
      - AIAgent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aiauto.aiagent
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: AI Agent
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Your AI agent reads your calendar to know your availability when coordinating plans."
        INFOPLIST_KEY_NSRemindersFullAccessUsageDescription: "Your AI agent reads your reminders to stay aware of your tasks and commitments."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Your AI agent uses your location to suggest nearby meeting spots."
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "AI Agent uses your local network to discover and communicate with nearby agents on other devices."
        INFOPLIST_KEY_NSBonjourServices:
          - _aiagent-p2p._tcp
          - _aiagent-p2p._udp
